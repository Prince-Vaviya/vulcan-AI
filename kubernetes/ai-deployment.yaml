apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ai

  template:
    metadata:
      labels:
        app: ai

    spec:
      containers:
      - name: ai-container
        image: ai-service
        imagePullPolicy: Never

        ports:
        - containerPort: 3001

        env:
        - name: TELEMETRY_SERVICE_URL
          value: "http://telemetry-service:3000"

        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10